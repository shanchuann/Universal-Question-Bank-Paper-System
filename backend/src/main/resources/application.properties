spring.application.name=Exam Platform

# Database Configuration - Local PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/uqbank}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driverClassName=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}

# 禁用 Flyway（迁移脚本为MySQL语法，与PostgreSQL不兼容）
spring.flyway.enabled=false

# 启用 data.sql 初始化数据
spring.sql.init.mode=${SQL_INIT_MODE:never}
spring.jpa.defer-datasource-initialization=true

# Remote Supabase (备份，如需切换取消注释)
# spring.datasource.url=jdbc:postgresql://aws-1-ap-southeast-1.pooler.supabase.com:6543/postgres?prepareThreshold=0
# spring.datasource.username=postgres.zblujqtkdpitthgkjcdi
# spring.datasource.password=${SUPABASE_DB_PASSWORD}

# Jackson Configuration
spring.jackson.deserialization.fail-on-unknown-properties=false

# Logging Configuration - 美化日志输出
spring.output.ansi.enabled=always
logging.pattern.console=%d{HH:mm:ss.SSS} %5p --- %-35.35logger{34} : %m%n
logging.level.root=INFO
logging.level.com.universal.qbank=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=${LOG_LEVEL_HIBERNATE_SQL:WARN}
logging.level.com.zaxxer.hikari=WARN
spring.jpa.open-in-view=false

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Email Configuration (SMTP)
# QQ SMTP: port 465 should use SSL, not STARTTLS
spring.mail.host=${SMTP_HOST:smtp.qq.com}
spring.mail.port=${SMTP_PORT:465}
spring.mail.username=${SMTP_USER:}
spring.mail.password=${SMTP_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.starttls.required=false
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# AI (Ollama)
ai.ollama.enabled=${AI_OLLAMA_ENABLED:true}
ai.ollama.base-url=${AI_OLLAMA_BASE_URL:http://localhost:11434}
ai.ollama.model=${AI_OLLAMA_MODEL:gemma4}
ai.ollama.timeout-ms=${AI_OLLAMA_TIMEOUT_MS:60000}
ai.ollama.auto-start=${AI_OLLAMA_AUTO_START:true}
