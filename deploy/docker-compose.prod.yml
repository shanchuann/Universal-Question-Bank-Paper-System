services:
  ollama:
    image: ollama/ollama:latest
    container_name: uqbank-ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - /root/.ollama:/root/.ollama
  uqbank-backend:
    image: ghcr.io/${GHCR_OWNER}/uqbank-backend:${BACKEND_TAG:-prod}
    container_name: uqbank-backend
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - ollama
    environment:
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      FLYWAY_ENABLED: ${FLYWAY_ENABLED:-true}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-validate}
      SQL_INIT_MODE: ${SQL_INIT_MODE:-never}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      AI_OLLAMA_ENABLED: ${AI_OLLAMA_ENABLED:-false}
      AI_OLLAMA_BASE_URL: ${AI_OLLAMA_BASE_URL}
      AI_OLLAMA_MODEL: ${AI_OLLAMA_MODEL}
      AI_OLLAMA_TIMEOUT_MS: ${AI_OLLAMA_TIMEOUT_MS:-180000}
      APP_CLEANUP_DROP_LEGACY_QUESTION_OPTIONS: ${APP_CLEANUP_DROP_LEGACY_QUESTION_OPTIONS:-false}
      TZ: ${TZ:-Asia/Shanghai}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      - com.centurylinklabs.watchtower.enable=true

  uqbank-frontend:
    image: ghcr.io/${GHCR_OWNER}/uqbank-frontend:${FRONTEND_TAG:-prod}
    container_name: uqbank-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - uqbank-backend
      - ollama
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - com.centurylinklabs.watchtower.enable=true

  watchtower:
    image: containrrr/watchtower:latest
    container_name: uqbank-watchtower
    restart: always
    command: --interval 60 --cleanup --rolling-restart --label-enable
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${DOCKER_CONFIG_PATH:-/root/.docker/config.json}:/config.json:ro